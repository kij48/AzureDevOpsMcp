name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

  all-checks-passed:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All matrix jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Test jobs failed or were cancelled (result: ${{ needs.test.result }})"
            exit 1
          fi